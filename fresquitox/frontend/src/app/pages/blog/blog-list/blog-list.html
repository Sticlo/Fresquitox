<!-- Hero -->
<section class="blog-hero">
  <div class="blog-hero__orb blog-hero__orb--1"></div>
  <div class="blog-hero__orb blog-hero__orb--2"></div>
  <div class="container">
    <nav class="blog-bread" aria-label="Breadcrumb">
      <a routerLink="/">Inicio</a> <span>/</span> <span>Blog</span>
    </nav>
    <span class="blog-hero__badge" data-animate>&#x1F4DD; Blog</span>
    <h1 data-animate data-animate-delay="100">Blog <em>Fresquitox</em></h1>
    <p data-animate data-animate-delay="200">Art&iacute;culos sobre nuestros granizados, jugos naturales, eventos y todo lo que pasa en el mundo Fresquitox.</p>
  </div>
</section>

<!-- Posts -->
<section class="blog-list">
  <div class="container">
    <div class="blog-grid">
      @for (post of posts; track post.slug; let i = $index) {
        <a [routerLink]="['/blog', post.slug]" class="blog-card" data-animate [attr.data-animate-delay]="i * 80">
          <div class="blog-card__body">
            <span class="blog-card__date">{{ formatDate(post.fecha) }}</span>
            <h2>{{ post.titulo }}</h2>
            <p>{{ post.extracto }}</p>
            <span class="blog-card__link">Leer m&aacute;s <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></span>
          </div>
        </a>
      }
    </div>
  </div>
</section>
